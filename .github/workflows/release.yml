name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_name: lh-linux-amd64
            archive_name: lh-linux-amd64.tar.gz
            binary_name: lh
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            artifact_name: lh-linux-arm64
            archive_name: lh-linux-arm64.tar.gz
            binary_name: lh
          - runner: windows-latest
            goos: windows
            goarch: amd64
            artifact_name: lh-windows-amd64
            archive_name: lh-windows-amd64.zip
            binary_name: lh.exe
          - runner: macos-13
            goos: darwin
            goarch: amd64
            artifact_name: lh-darwin-amd64
            archive_name: lh-darwin-amd64.tar.gz
            binary_name: lh
          - runner: macos-14
            goos: darwin
            goarch: arm64
            artifact_name: lh-darwin-arm64
            archive_name: lh-darwin-arm64.tar.gz
            binary_name: lh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-toolchain

      - name: Build binary
        if: runner.os != 'Windows'
        shell: bash
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          DATE: ${{ github.event.head_commit.timestamp || github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o "dist/${{ matrix.binary_name }}" ./cmd/lh

      - name: Build binary
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          DATE: ${{ github.event.head_commit.timestamp || github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o "dist/${{ matrix.binary_name }}" ./cmd/lh

      - name: Package release archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/UI/TUI
          cp UI/package.json UI/package-lock.json dist/UI/
          cp UI/TUI/package.json UI/TUI/tsconfig.json dist/UI/TUI/
          cp -R UI/TUI/src dist/UI/TUI/src
          cd dist
          tar -czf "../${{ matrix.archive_name }}" "${{ matrix.binary_name }}" UI

      - name: Package release archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/UI/TUI" | Out-Null
          Copy-Item -Force "UI/package.json", "UI/package-lock.json" "dist/UI/"
          Copy-Item -Force "UI/TUI/package.json", "UI/TUI/tsconfig.json" "dist/UI/TUI/"
          Copy-Item -Recurse -Force "UI/TUI/src" "dist/UI/TUI/src"
          Compress-Archive -Path "dist/${{ matrix.binary_name }}", "dist/UI" -DestinationPath "${{ matrix.archive_name }}" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
