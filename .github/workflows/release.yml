name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_name: lh-linux-amd64
            archive_name: lh-linux-amd64.tar.gz
            binary_name: lh
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact_name: lh-windows-amd64
            archive_name: lh-windows-amd64.zip
            binary_name: lh.exe
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact_name: lh-darwin-amd64
            archive_name: lh-darwin-amd64.tar.gz
            binary_name: lh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-toolchain

      - name: Build binary
        if: runner.os != 'Windows'
        shell: bash
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          DATE: ${{ github.event.head_commit.timestamp || github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o "dist/${{ matrix.binary_name }}" ./cmd/lh

      - name: Build binary
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          DATE: ${{ github.event.head_commit.timestamp || github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o "dist/${{ matrix.binary_name }}" ./cmd/lh

      - name: Package release archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          tar -czf "../${{ matrix.archive_name }}" "${{ matrix.binary_name }}"

      - name: Package release archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "${{ matrix.archive_name }}" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
