name: CI

on:
  push:
    branches: [master, dev-*]
    tags:
      - '*'
  pull_request:
    branches: [master, dev-*]
    types: [opened, synchronize, reopened, ready_for_review]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/yurika0211/luckyagent

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: UI/package-lock.json
      - name: Download dependencies
        run: go mod download
      - name: Install UI dependencies
        working-directory: UI
        run: npm ci
      - name: Typecheck UI
        working-directory: UI
        run: npm run typecheck
      - name: Run tests
        run: go test ./... -race -count=1 -timeout 10m
      - name: Build
        run: go build -o lh ./cmd/lh
      - name: Verify binary
        run: ./lh version
      - name: Smoke release archive layout
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .ci-release
          mkdir -p .ci-release/dist/UI/TUI .ci-release/extract
          cp lh .ci-release/dist/lh
          cp UI/package.json UI/package-lock.json .ci-release/dist/UI/
          cp UI/TUI/package.json UI/TUI/tsconfig.json .ci-release/dist/UI/TUI/
          cp -R UI/TUI/src .ci-release/dist/UI/TUI/src
          tar -czf .ci-release/lh-linux-amd64.tar.gz -C .ci-release/dist lh UI
          tar -xzf .ci-release/lh-linux-amd64.tar.gz -C .ci-release/extract
          test -x .ci-release/extract/lh
          test -f .ci-release/extract/UI/package.json
          test -f .ci-release/extract/UI/TUI/src/index.tsx

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
