services:
  luckyagent:
    build:
      context: .
      dockerfile: Dockerfile
    image: luckyagent:dev
    container_name: luckyagent
    entrypoint: ["luckyagent"]
    restart: unless-stopped
    environment:
      HOME: /var/lib/luckyagent
      TZ: ${TZ:-Asia/Shanghai}
    command: ["serve"]
    ports:
      - "${LH_PORT:-9090}:9090"
    volumes:
      - lh-home:/var/lib/luckyagent
      - ./config.json:/var/lib/luckyagent/.luckyagent/config.json
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/api/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  luckyagent-telegram:
    image: luckyagent:dev
    container_name: luckyagent-telegram
    entrypoint: ["luckyagent"]
    restart: unless-stopped
    environment:
      HOME: /var/lib/luckyagent
      TZ: ${TZ:-Asia/Shanghai}
    command: ["msg-gateway", "start", "--platform", "telegram"]
    volumes:
      - lh-home:/var/lib/luckyagent
      - ./config.json:/var/lib/luckyagent/.luckyagent/config.json
    depends_on:
      luckyagent:
        condition: service_healthy

  luckyagent-napcat:
    image: luckyagent:dev
    container_name: luckyagent-napcat
    entrypoint: ["luckyagent"]
    restart: unless-stopped
    environment:
      HOME: /var/lib/luckyagent
      TZ: ${TZ:-Asia/Shanghai}
    command: ["msg-gateway", "start", "--platform", "napcat", "--napcat-listen", "0.0.0.0:6701"]
    ports:
      - "${LH_NAPCAT_PORT:-6701}:6701"
    volumes:
      - lh-home:/var/lib/luckyagent
      - ./config.json:/var/lib/luckyagent/.luckyagent/config.json
    depends_on:
      luckyagent:
        condition: service_healthy

volumes:
  lh-home:
