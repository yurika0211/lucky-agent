services:
  luckyharness:
    build:
      context: .
      dockerfile: Dockerfile
    image: luckyharness:dev
    container_name: luckyharness
    entrypoint: ["luckyharness"]
    restart: unless-stopped
    environment:
      HOME: /var/lib/luckyharness
      TZ: ${TZ:-Asia/Shanghai}
    command: ["serve"]
    ports:
      - "${LH_PORT:-9090}:9090"
    volumes:
      - lh-home:/var/lib/luckyharness
      - ./config.json:/var/lib/luckyharness/.luckyharness/config.json
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/api/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  luckyharness-telegram:
    image: luckyharness:dev
    container_name: luckyharness-telegram
    entrypoint: ["luckyharness"]
    restart: unless-stopped
    environment:
      HOME: /var/lib/luckyharness
      TZ: ${TZ:-Asia/Shanghai}
    command: ["msg-gateway", "start", "--platform", "telegram"]
    volumes:
      - lh-home:/var/lib/luckyharness
      - ./config.json:/var/lib/luckyharness/.luckyharness/config.json
    depends_on:
      luckyharness:
        condition: service_healthy

  luckyharness-napcat:
    image: luckyharness:dev
    container_name: luckyharness-napcat
    entrypoint: ["luckyharness"]
    restart: unless-stopped
    environment:
      HOME: /var/lib/luckyharness
      TZ: ${TZ:-Asia/Shanghai}
    command: ["msg-gateway", "start", "--platform", "napcat", "--napcat-listen", "0.0.0.0:6701"]
    ports:
      - "${LH_NAPCAT_PORT:-6701}:6701"
    volumes:
      - lh-home:/var/lib/luckyharness
      - ./config.json:/var/lib/luckyharness/.luckyharness/config.json
    depends_on:
      luckyharness:
        condition: service_healthy

volumes:
  lh-home:
