x-luckyagent-env: &luckyagent-env
  HOME: /var/lib/luckyagent
  TZ: ${TZ:-Asia/Shanghai}

services:
  luckyagent:
    image: ${LH_IMAGE:-ghcr.io/yurika0211/luckyagent:latest}
    container_name: luckyagent
    entrypoint: ["luckyagent"]
    restart: unless-stopped
    environment: *luckyagent-env
    command: ["serve"]
    ports:
      - "${LH_PORT:-9090}:9090"
    volumes:
      - lh-home:/var/lib/luckyagent
      - ~/.luckyagent/config.json:/var/lib/luckyagent/.luckyagent/config.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/api/v1/health/live >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  luckyagent-telegram:
    image: ${LH_IMAGE:-ghcr.io/yurika0211/luckyagent:latest}
    container_name: luckyagent-telegram
    entrypoint: ["luckyagent"]
    restart: unless-stopped
    profiles: ["telegram"]
    environment: *luckyagent-env
    command: ["msg-gateway", "start", "--platform", "telegram"]
    volumes:
      - lh-home:/var/lib/luckyagent
      - ~/.luckyagent/config.json:/var/lib/luckyagent/.luckyagent/config.json:ro

  luckyagent-napcat:
    image: ${LH_IMAGE:-ghcr.io/yurika0211/luckyagent:latest}
    container_name: luckyagent-napcat
    entrypoint: ["luckyagent"]
    restart: unless-stopped
    profiles: ["napcat"]
    environment: *luckyagent-env
    command: ["msg-gateway", "start", "--platform", "napcat", "--napcat-listen", "0.0.0.0:6701"]
    ports:
      - "${LH_NAPCAT_PORT:-6701}:6701"
    volumes:
      - lh-home:/var/lib/luckyagent
      - ~/.luckyagent/config.json:/var/lib/luckyagent/.luckyagent/config.json:ro
    depends_on:
      luckyagent:
        condition: service_healthy

volumes:
  lh-home:
